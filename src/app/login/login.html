 <div class="login-container">
  <div class="login-card">

    <h2>Hotel Login</h2>

    <form (ngSubmit)="onLogin()">

      <input 
        type="text" 
        placeholder="Username" 
        [(ngModel)]="username" 
        name="username" 
        required 
      />

      <input 
        type="password" 
        placeholder="Password" 
        [(ngModel)]="password" 
        name="password" 
        required 
      />

      <button type="submit">Login</button>

    </form>

    <p *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </p>

  </div>
</div>
