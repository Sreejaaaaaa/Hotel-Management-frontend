<div class="container">

  <!-- HERO -->
  <div class="hero">
    <img src="/assets/images/hotel_banner.jpg" alt="Hotel" />
    <div class="overlay">
      <h1>Luxury Hotel Experience</h1>
      <p>Book your perfect stay</p>
    </div>
  </div>

  <!-- TITLE -->
  <h2 class="title">Rooms</h2>
  <p class="role">Your Role: {{ role }}</p>

  <!-- FILTER -->
  <div class="filter">
    <select [(ngModel)]="filterType">
      <option value="ALL">All Rooms</option>
      <option value="DELUXE">DELUXE</option>
      <option value="STANDARD">STANDARD</option>
      <option value="SUITE">SUITE</option>
    </select>
  </div>

  <!-- ADD ROOM -->
  <div class="add-room" *ngIf="role === 'OWNER' || role === 'MANAGER'">

    <select [(ngModel)]="newRoom.type">
      <option value="">Select Type</option>
      <option value="DELUXE">DELUXE</option>
      <option value="STANDARD">STANDARD</option>
      <option value="SUITE">SUITE</option>
    </select>

    <input 
      [(ngModel)]="newRoom.price" 
      type="number" 
      placeholder="Price"
    />

    <button 
      (click)="addRoom()"
      [disabled]="!newRoom.type || newRoom.price <= 0 || isSubmitting">
      Add Room
    </button>

  </div>

  <!-- EMPTY -->
  <p *ngIf="filteredRooms.length === 0" class="empty">
    No rooms found
  </p>

  <!-- ROOM GRID -->
  <div class="room-grid">
    <div class="room-card" *ngFor="let room of filteredRooms">

      <!-- ROOM IMAGE -->
      <img 
        class="room-img"
        [src]="'assets/images/room' + (room.id % 4 + 1) + '.jpg'" 
        alt="Room"
      />

      <h3>{{ room.type }}</h3>
      <p class="price">₹{{ room.price }}</p>

      <span 
        class="status" 
        [ngClass]="room.available ? 'available' : 'booked'">
        {{ room.available ? 'Available' : 'Booked' }}
      </span>

      <div class="actions">

        <button 
          class="book-btn"
          (click)="goToBooking(room)" 
          [disabled]="!room.available">
          Book
        </button>

        <button 
          *ngIf="role === 'OWNER' && room.available"
          class="delete"
          (click)="deleteRoom(room.id, room)">
          Delete
        </button>

      </div>

    </div>
  </div>

</div>
